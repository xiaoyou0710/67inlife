<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生活裡的 67</title>
    <style>
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-main: #1A1A1A;
            --border-light: #EAEAEA;
            --text-sub: #999999;
            --accent-color: #000000;
        }

        body {
            margin: 0; padding: 0;
            font-family: "Arial Black", "Inter", sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 0;
            display: flex; flex-direction: column; justify-content: center;
            transform: rotate(-10deg) scale(1.8); gap: 12vh;
        }

        .scroll-content {
            display: flex; white-space: nowrap; font-size: 15vh; font-weight: 900;
            color: rgba(0, 0, 0, 0.02); animation: marquee 40s linear infinite;
        }

        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        header {
            position: relative; z-index: 10; text-align: center;
            padding: 60px 20px; background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-light);
        }

        .nav-submit-btn {
            position: absolute; top: 30px; right: 40px;
            background: var(--accent-color); color: #fff;
            padding: 12px 25px; border-radius: 50px;
            text-decoration: none; font-weight: 900; font-size: 0.9rem;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .nav-submit-btn:hover { transform: translateY(-2px); background: #333; }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900; letter-spacing: -2px; margin: 0;
            display: flex; justify-content: center; align-items: center; gap: 0.5em;
            cursor: pointer;
        }

        .digit-6, .digit-7 { display: inline-block; will-change: transform; }

        .controls { 
            margin: 30px auto 0; display: flex; flex-direction: column; 
            align-items: center; gap: 20px; width: 100%; max-width: 600px;
        }
        
        #searchInput {
            width: 90%; max-width: 500px; padding: 15px 25px;
            border: 2px solid var(--border-light); border-radius: 60px;
            font-size: 1.2rem; font-weight: 900; outline: none; transition: 0.3s;
            background-color: var(--bg-secondary);
        }

        #searchInput:focus { background-color: #fff; border-color: #000; }

        main {
            position: relative; z-index: 5; max-width: 1200px;
            margin: 40px auto; padding: 0 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 40px;
        }

        .card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.02); transition: 0.4s; }
        .card:hover { transform: translateY(-10px); }

        .card-category-header {
            background-color: #FFFFFF;
            padding: 14px 20px;
            font-size: 0.8rem;
            font-weight: 900;
            color: #AAAAAA;
            border-bottom: 1px solid #F0F0F0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 45px;
            box-sizing: border-box;
            align-items: center;
        }

        .cat-item::after { content: "•"; margin-left: 8px; color: #DDD; }
        .cat-item:last-child::after { content: ""; }

        .image-box {
            width: 100%; aspect-ratio: 5 / 3; background-color: #F0F0F0; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .error-label { display: none; font-size: 1.5rem; font-weight: 900; color: #CCCCCC; letter-spacing: 1px; }

        .card-info { padding: 25px; text-align: center; }
        .card-info h3 { margin: 0; font-size: 1.2rem; font-weight: 900; color: #000; line-height: 1.4; }
        .card-contributor {
            margin-top: 10px; font-size: 0.75rem; color: var(--text-sub);
            font-weight: 900; letter-spacing: 0.5px;
        }

        #loader { text-align: center; font-weight: 900; color: #999; margin: 100px auto; font-size: 1.5rem; }

        .fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 65px; height: 65px; background: #000; color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            text-decoration: none; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s; display: none;
        }

        .fab svg { width: 30px; height: 30px; fill: white; }

        .vibrate-mode { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, -1px); } }

        @media (max-width: 768px) {
            header { padding: 40px 20px; }
            .nav-submit-btn { display: none; }
            .fab { display: flex; }
        }
        @media (max-width: 400px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="scroll-content">67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67</div>
        <div class="scroll-content">67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67 67</div>
    </div>

    <header>
        <a href="submit.html" class="nav-submit-btn">
            <svg style="width:18px;height:18px;" viewBox="0 0 24 24"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
            我要投稿
        </a>
        <h1 id="title">生活裡的&nbsp;<span class="digit-6" id="d6">6</span><span class="digit-7" id="d7">7</span></h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="">
        </div>
    </header>

    <div id="loader">載入 67 中...</div>
    <main id="gallery"></main>

    <a href="submit.html" class="fab">
        <svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
    </a>

    <script>
        const SPREADSHEET_ID = '1IWOnENVNo5HSODC63Vj3fkzbOThTpQHYJJgp5O8Heak';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        let allData = [];

        const d6 = document.getElementById('d6'), d7 = document.getElementById('d7'), title = document.getElementById('title');
        let phase = 0, freq = 0.05, isHover = false;
        
        title.addEventListener('mouseenter', () => isHover = true);
        title.addEventListener('mouseleave', () => isHover = false);
        title.addEventListener('touchstart', () => isHover = true);
        title.addEventListener('touchend', () => isHover = false);

        function animateTitle() {
            if (isHover) { if (freq < 0.8) freq += 0.003; } 
            else { if (freq > 0.05) freq -= 0.01; else freq = 0.05; }
            phase += freq;
            const y = Math.sin(phase) * 12;
            d6.style.transform = `translateY(${y}px)`;
            d7.style.transform = `translateY(${-y}px)`;
            requestAnimationFrame(animateTitle);
        }
        animateTitle();

        const searchInput = document.getElementById('searchInput');
        const placeholders = ["搜尋 67...", "尋找第 67 頁...", "Six~ Seven~", "誰發現了 67？"];
        let pIndex = 0, charIndex = 0, isDeleting = false;

        function typeEffect() {
            const currentText = placeholders[pIndex];
            if (isDeleting) {
                searchInput.placeholder = currentText.substring(0, charIndex--);
            } else {
                searchInput.placeholder = currentText.substring(0, charIndex++);
            }

            let speed = isDeleting ? 50 : 150;
            if (!isDeleting && charIndex > currentText.length) {
                isDeleting = true;
                speed = 1500;
            } else if (isDeleting && charIndex < 0) {
                isDeleting = false;
                pIndex = (pIndex + 1) % placeholders.length;
                charIndex = 0;
                speed = 500;
            }
            setTimeout(typeEffect, speed);
        }
        typeEffect();

        async function loadSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const start = text.indexOf('{');
                const end = text.lastIndexOf('}') + 1;
                const jsonString = text.substring(start, end);
                const jsonData = JSON.parse(jsonString);
                const rows = jsonData.table.rows.slice(1);

                allData = rows.map(row => {
                    if (!row || !row.c) return null;
                    const tagRaw = row.c[3] ? (row.c[3].f || row.c[3].v || "") : "";
                    const tags = tagRaw ? tagRaw.split(',').map(t => t.trim()) : [];
                    return {
                        c: row.c[0] ? (row.c[0].f || row.c[0].v) : '匿名',
                        t: row.c[1] ? (row.c[1].f || row.c[1].v) : '無標題',
                        i: row.c[2] ? row.c[2].v : '',
                        tags: tags
                    };
                })
                .filter(item => item !== null && item.i)
                .reverse();

                document.getElementById('loader').style.display = 'none';
                render(allData);
            } catch (e) {
                document.getElementById('loader').textContent = "讀取失敗";
            }
        }

        function render(data) {
            const container = document.getElementById('gallery');
            container.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const tagContent = item.tags.map(t => `<span class="cat-item">${t}</span>`).join('');
                card.innerHTML = `
                    <div class="card-category-header">${tagContent}</div>
                    <div class="image-box">
                        <img src="${item.i}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <div class="error-label" style="display:none;">ERROR 67</div>
                    </div>
                    <div class="card-info">
                        <h3>${item.t}</h3>
                        <div class="card-contributor">@${item.c}</div>
                    </div>
                `;
                const img = card.querySelector('img');
                img.onerror = function() {
                    this.style.display = 'none';
                    this.nextElementSibling.style.display = 'block';
                };
                container.appendChild(card);
            });
        }

        searchInput.oninput = function() {
            const query = this.value.toLowerCase();
            const filtered = allData.filter(item => 
                item.t.toLowerCase().includes(query) || 
                item.c.toLowerCase().includes(query) ||
                (item.tags && item.tags.some(tag => tag.toLowerCase().includes(query)))
            );
            render(filtered);
            if (query === '67') {
                document.body.classList.add('vibrate-mode');
                if (navigator.vibrate) navigator.vibrate(500);
            } else {
                document.body.classList.remove('vibrate-mode');
            }
        };

        loadSheetData();
    </script>
</body>
</html>
